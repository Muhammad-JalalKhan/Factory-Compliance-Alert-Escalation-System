name: Factory Compliance CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v3

    # Set up Python environment
    - name: Set up Python 3.10
      uses: actions/programs/setup-python@v4
      with:
        python-version: "3.10"

    # Install the same workspace dependencies
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # Code quality linting step to keep it exceptionally clean
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings.
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    # Build the docker container to verify compilation succeeds
    - name: Build Docker Image
      run: |
        docker build -t factory-compliance-system:latest .